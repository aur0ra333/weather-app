<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天气查询 - Weather App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 动态背景 -->
    <div class="animated-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
    </div>

    <div class="container glass">
        <header>
            <div class="header-top">
                <h1><span class="header-icon">🌤️</span> 天气查询</h1>
                <div class="header-actions">
                    <button class="btn-icon" id="location-btn" title="定位当前位置">
                        📍
                    </button>
                    <button class="btn-icon" id="theme-toggle" title="切换主题">
                        🌙
                    </button>
                </div>
            </div>
        </header>

        <div class="search-section">
            <div class="search-box">
                <input type="text" id="city-input" placeholder="输入城市名称..." />
                <button id="search-btn" class="btn-search">🔍</button>
            </div>
            
            <div class="favorite-cities">
                <span class="section-label">收藏城市：</span>
                <div id="favorite-cities-list" class="city-tags">
                    <!-- 动态加载 -->
                </div>
                <button class="btn-add-city" id="add-favorite-btn" title="添加当前城市到收藏">
                    ➕
                </button>
            </div>
        </div>

        <!-- 天气内容 (与原版相同，省略) -->
        <div id="weather-content" class="weather-content" style="display: none;">
            <!-- 天气展示内容 -->
        </div>

        <div class="demo-notice glass">
            💡 演示模式：使用模拟数据
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
