<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天气查询 - Weather App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="search-section">
            <h1>🌤️ 天气查询</h1>
            <div class="search-box">
                <input type="text" id="city-input" placeholder="输入城市名称，如：北京、上海、Guangzhou..." />
                <button id="search-btn" class="btn-search">
                    <span>🔍</span>
                </button>
            </div>
            <div class="quick-cities">
                <span class="quick-label">热门城市：</span>
                <button class="city-tag" data-city="北京">北京</button>
                <button class="city-tag" data-city="上海">上海</button>
                <button class="city-tag" data-city="广州">广州</button>
                <button class="city-tag" data-city="深圳">深圳</button>
                <button class="city-tag" data-city="成都">成都</button>
            </div>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>正在获取天气数据...</p>
        </div>

        <div id="error-message" class="error-message" style="display: none;">
            <div class="error-icon">⚠️</div>
            <p id="error-text"></p>
        </div>

        <div id="weather-content" class="weather-content" style="display: none;">
            <div class="current-weather">
                <div class="weather-main">
                    <div class="weather-icon">
                        <img id="weather-icon" src="" alt="Weather Icon" />
                    </div>
                    <div class="weather-info">
                        <h2 id="city-name">--</h2>
                        <div class="temperature">
                            <span id="temp">--</span>
                            <span class="degree">°C</span>
                        </div>
                        <p id="weather-desc" class="weather-description">--</p>
                    </div>
                </div>
                
                <div class="weather-details">
                    <div class="detail-card">
                        <div class="detail-icon">🌡️</div>
                        <div class="detail-label">体感温度</div>
                        <div class="detail-value" id="feels-like">--°C</div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-icon">💧</div>
                        <div class="detail-label">湿度</div>
                        <div class="detail-value" id="humidity">--%</div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-icon">💨</div>
                        <div class="detail-label">风速</div>
                        <div class="detail-value" id="wind-speed">-- m/s</div>
                    </div>
                    <div class="detail-card">
                        <div class="detail-icon">🌅</div>
                        <div class="detail-label">日出</div>
                        <div class="detail-value" id="sunrise">--:--</div>
                    </div>
                </div>
            </div>

            <div class="forecast-section">
                <h3>📅 未来天气预报</h3>
                <div class="forecast-grid" id="forecast-grid">
                    <!-- 天气预报将通过 JavaScript 动态加载 -->
                </div>
            </div>
        </div>

        <div class="demo-mode-notice">
            <p>💡 提示：当前使用模拟数据演示模式。要获取真实天气数据，需要注册 <a href="https://openweathermap.org/api" target="_blank">OpenWeatherMap API</a> 密钥。</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
