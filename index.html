<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城市天气观察台 - Weather Desk</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="weather-shell">
        <section class="hero">
            <div>
                <p class="eyebrow">Weather Desk</p>
                <h1>城市天气观察台</h1>
                <p>把天气查询、舒适度、空气质量和城市对比放在一个页面里，适合做接口数据展示类项目。</p>
            </div>
            <div class="unit-toggle" role="group" aria-label="温度单位">
                <button class="active" data-unit="c" type="button">°C</button>
                <button data-unit="f" type="button">°F</button>
            </div>
        </section>

        <section class="search-panel">
            <div class="search-box">
                <input id="city-input" type="search" placeholder="搜索城市：北京、上海、广州、深圳、郑州、杭州..." autocomplete="off">
                <button id="search-btn" type="button">查询</button>
            </div>
            <button id="location-btn" class="ghost-btn" type="button">使用演示定位</button>
            <button id="favorite-btn" class="ghost-btn" type="button">收藏当前城市</button>
        </section>

        <p id="error-message" class="error-message" hidden></p>

        <section class="dashboard-grid">
            <article class="current-card">
                <div class="current-topline">
                    <span id="weather-symbol" class="weather-symbol">--</span>
                    <div>
                        <p id="weather-desc" class="weather-desc">--</p>
                        <h2 id="city-name">--</h2>
                    </div>
                </div>
                <div class="temperature-row">
                    <strong id="temp">--</strong>
                    <span id="degree-label">°C</span>
                </div>
                <p id="summary-text" class="summary-text">正在读取演示数据。</p>
                <div class="comfort-meter">
                    <div class="comfort-head">
                        <span>舒适度</span>
                        <strong id="comfort-label">--</strong>
                    </div>
                    <div class="comfort-track"><span id="comfort-bar"></span></div>
                </div>
            </article>

            <article class="detail-grid" aria-label="天气详情">
                <div class="detail-card">
                    <span>体感温度</span>
                    <strong id="feels-like">--</strong>
                </div>
                <div class="detail-card">
                    <span>湿度</span>
                    <strong id="humidity">--</strong>
                </div>
                <div class="detail-card">
                    <span>风速</span>
                    <strong id="wind-speed">--</strong>
                </div>
                <div class="detail-card">
                    <span>空气质量</span>
                    <strong id="aqi">--</strong>
                </div>
                <div class="detail-card">
                    <span>紫外线</span>
                    <strong id="uv-index">--</strong>
                </div>
                <div class="detail-card">
                    <span>气压</span>
                    <strong id="pressure">--</strong>
                </div>
            </article>
        </section>

        <section class="content-grid">
            <article class="panel">
                <div class="panel-header">
                    <h2>未来 5 天趋势</h2>
                    <p>演示数据会根据城市稳定生成，便于重复验证。</p>
                </div>
                <div id="forecast-grid" class="forecast-grid"></div>
            </article>

            <aside class="panel">
                <div class="panel-header">
                    <h2>城市对比</h2>
                    <p>快速比较温度、湿度、空气质量。</p>
                </div>
                <div id="compare-list" class="compare-list"></div>
            </aside>
        </section>

        <section class="panel quick-panel">
            <div>
                <h2>快速入口</h2>
                <p>收藏城市和最近查询保存在浏览器本地。</p>
            </div>
            <div class="quick-groups">
                <div>
                    <h3>收藏城市</h3>
                    <div id="favorite-list" class="city-tags"></div>
                </div>
                <div>
                    <h3>最近查询</h3>
                    <div id="recent-list" class="city-tags"></div>
                </div>
            </div>
        </section>

        <footer class="demo-note">
            当前为静态演示版本，使用本地模拟数据；后续可替换为真实天气 API 数据源。
        </footer>
    </main>

    <script src="app.js"></script>
</body>
</html>
