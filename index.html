<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天气查询 - Weather App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 动态背景 -->
    <div class="animated-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
    </div>

    <div class="container glass">
        <header>
            <div class="header-top">
                <h1><span class="header-icon">🌤️</span> 天气查询</h1>
                <div class="header-actions">
                    <button class="btn-icon" id="location-btn" title="定位当前位置">📍</button>
                    <button class="btn-icon" id="theme-toggle" title="切换主题">🌙</button>
                </div>
            </div>
        </header>

        <div class="search-section">
            <div class="search-box">
                <input type="text" id="city-input" placeholder="输入城市名称..." />
                <button id="search-btn" class="btn-search">🔍</button>
            </div>
            
            <div class="favorite-cities">
                <span class="section-label">收藏城市：</span>
                <div id="favorite-cities-list" class="city-tags">
                    <!-- 动态加载 -->
                </div>
                <button class="btn-add-city" id="add-favorite-btn" title="添加当前城市到收藏">➕</button>
            </div>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>正在获取天气数据...</p>
        </div>

        <div id="error-message" class="error-message" style="display: none;">
            <div class="error-icon">⚠️</div>
            <p id="error-text"></p>
        </div>

        <div id="weather-content" class="weather-content" style="display: none;">
            <div class="current-weather">
                <div class="weather-main">
                    <div class="weather-icon">
                        <img id="weather-icon" src="" alt="Weather Icon" />
                    </div>
                    <div class="weather-info">
                        <h2 id="city-name">--</h2>
                        <div class="temperature">
                            <span id="temp">--</span>
                            <span class="degree">°C</span>
                        </div>
                        <p id="weather-desc" class="weather-description">--</p>
                    </div>
                </div>
                
                <div class="weather-details">
                    <div class="detail-card glass">
                        <div class="detail-icon">🌡️</div>
                        <div class="detail-label">体感温度</div>
                        <div class="detail-value" id="feels-like">--°C</div>
                    </div>
                    <div class="detail-card glass">
                        <div class="detail-icon">💧</div>
                        <div class="detail-label">湿度</div>
                        <div class="detail-value" id="humidity">--%</div>
                    </div>
                    <div class="detail-card glass">
                        <div class="detail-icon">💨</div>
                        <div class="detail-label">风速</div>
                        <div class="detail-value" id="wind-speed">-- m/s</div>
                    </div>
                    <div class="detail-card glass">
                        <div class="detail-icon">🌅</div>
                        <div class="detail-label">日出</div>
                        <div class="detail-value" id="sunrise">--:--</div>
                    </div>
                </div>
            </div>

            <div class="forecast-section">
                <h3>📅 未来 5 天预报</h3>
                <div class="forecast-grid" id="forecast-grid">
                    <!-- 天气预报将通过 JavaScript 动态加载 -->
                </div>
            </div>
        </div>

        <div class="demo-notice glass">
            💡 演示模式：使用模拟数据 | 支持自动定位和收藏城市功能
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
